<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    p.sub {
      color: #8888aa;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="url"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #0d0d1a;
      color: #e0e0f0;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    input[type="url"]:focus {
      border-color: #7c83ff;
    }

    button {
      padding: 12px 20px;
      background: #7c83ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }

    button:hover { background: #6068ee; }
    button:active { transform: scale(0.97); }

    .shortcuts {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      padding: 6px 14px;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      font-size: 13px;
      color: #8888cc;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      text-decoration: none;
    }

    .chip:hover {
      border-color: #7c83ff;
      color: #c0c0ff;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #444466;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🌐</div>
    <h1>Open Browse</h1>
    <p class="sub">Enter any URL to browse through the proxy</p>

    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://example.com" autofocus />
      <button onclick="go()">Go</button>
    </div>

    <div class="shortcuts">
      <a class="chip" onclick="nav('https://www.google.com')">Google</a>
      <a class="chip" onclick="nav('https://www.wikipedia.org')">Wikipedia</a>
      <a class="chip" onclick="nav('https://www.reddit.com')">Reddit</a>
      <a class="chip" onclick="nav('https://www.youtube.com')">YouTube</a>
      <a class="chip" onclick="nav('https://www.github.com')">GitHub</a>
      <a class="chip" onclick="nav('https://news.ycombinator.com')">HN</a>
    </div>
  </div>

  <p class="footer">Traffic is routed through this server — not your local network</p>

  <script>
    function go() {
      let val = document.getElementById('urlInput').value.trim();
      if (!val) return;
      if (!val.startsWith('http://') && !val.startsWith('https://')) {
        val = 'https://' + val;
      }
      window.location.href = '/proxy?url=' + encodeURIComponent(val);
    }

    function nav(url) {
      window.location.href = '/proxy?url=' + encodeURIComponent(url);
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') go();
    });
  </script>
</body>
</html>
